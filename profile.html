<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | EduFocus AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- GSAP Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .profile-gradient {
            background: linear-gradient(135deg, #38bdf8 0%, #818cf8 100%);
        }

        .streak-flame {
            filter: drop-shadow(0 0 8px #f59e0b);
            animation: flicker 1.5s infinite alternate;
        }

        @keyframes flicker {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        .badge-locked {
            filter: grayscale(1) opacity(0.3);
        }

        .input-pill:focus {
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.3);
        }
    </style>
</head>
<body class="antialiased min-h-screen">

    <!-- 🧭 Navigation (Consistent) -->
    <nav class="w-full z-50 border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-sky-500 rounded-lg flex items-center justify-center">
                    <i data-lucide="brain-circuit" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight">EduFocus</span>
            </div>
            
            <div class="hidden md:flex items-center gap-8">
                <a href="index.html" class="hover:text-sky-400 transition-colors">Home</a>
                <a href="study.html" class="hover:text-sky-400 transition-colors">Study</a>
                <a href="planner.html" class="hover:text-sky-400 transition-colors">Planner</a>
                <a href="analytics.html" class="hover:text-sky-400 transition-colors">Analytics</a>
                <a href="profile.html" class="text-sky-400 font-semibold">Profile</a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- Profile Header Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12 items-center">
            <div class="lg:col-span-2 flex items-center gap-8">
                <div class="relative group">
                    <div class="w-32 h-32 rounded-[2.5rem] profile-gradient p-1 shadow-2xl shadow-sky-500/20">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Ishan" class="w-full h-full rounded-[2.3rem] bg-slate-900" alt="Avatar">
                    </div>
                    <button class="absolute -bottom-2 -right-2 bg-slate-800 p-2 rounded-xl border border-white/10 hover:bg-slate-700 transition-colors">
                        <i data-lucide="camera" class="w-4 h-4 text-sky-400"></i>
                    </button>
                </div>
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tight">Ishan <span class="text-sky-500 text-xl font-medium">🚀</span></h1>
                    <p class="text-slate-400 mt-1 italic">"The dream is free, the hustle is sold separately."</p>
                    <div class="flex gap-3 mt-4">
                        <span class="px-3 py-1 bg-sky-500/10 text-sky-400 text-[10px] font-bold uppercase tracking-widest rounded-full border border-sky-500/20">Focus Master Lv.12</span>
                        <span class="px-3 py-1 bg-amber-500/10 text-amber-400 text-[10px] font-bold uppercase tracking-widest rounded-full border border-amber-500/20">Pro Student</span>
                    </div>
                </div>
            </div>

            <!-- Streak Card -->
            <div class="glass-card p-6 rounded-[2rem] flex items-center justify-between border-amber-500/20">
                <div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Current Streak</p>
                    <h3 class="text-4xl font-black mt-1" id="streak-val">8 Days</h3>
                </div>
                <div class="streak-flame">
                    <i data-lucide="flame" class="w-12 h-12 text-amber-500 fill-amber-500"></i>
                </div>
            </div>
        </div>

        <!-- Stats Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
            <div class="glass-card p-8 rounded-[2rem] text-center">
                <i data-lucide="clock" class="w-8 h-8 text-sky-400 mx-auto mb-4"></i>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Lifetime Study</p>
                <h4 class="text-2xl font-bold mt-2" id="total-hours">124.5 hrs</h4>
            </div>
            <div class="glass-card p-8 rounded-[2rem] text-center">
                <i data-lucide="target" class="w-8 h-8 text-indigo-400 mx-auto mb-4"></i>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Avg Focus</p>
                <h4 class="text-2xl font-bold mt-2" id="avg-focus">92%</h4>
            </div>
            <div class="glass-card p-8 rounded-[2rem] text-center">
                <i data-lucide="trophy" class="w-8 h-8 text-emerald-400 mx-auto mb-4"></i>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Badges earned</p>
                <h4 class="text-2xl font-bold mt-2">14</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Achievements -->
            <div class="glass-card p-8 rounded-[2.5rem]">
                <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
                    <i data-lucide="award" class="text-sky-400"></i> Achievements
                </h3>
                <div class="grid grid-cols-4 gap-4">
                    <div class="aspect-square bg-slate-800/50 rounded-2xl flex items-center justify-center" title="Early Bird">
                        <i data-lucide="sunrise" class="w-8 h-8 text-amber-400"></i>
                    </div>
                    <div class="aspect-square bg-slate-800/50 rounded-2xl flex items-center justify-center" title="Deep Focus">
                        <i data-lucide="brain" class="w-8 h-8 text-sky-400"></i>
                    </div>
                    <div class="aspect-square bg-slate-800/50 rounded-2xl flex items-center justify-center" title="Posture King">
                        <i data-lucide="accessibility" class="w-8 h-8 text-emerald-400"></i>
                    </div>
                    <div class="aspect-square bg-slate-800/50 rounded-2xl flex items-center justify-center badge-locked" title="7 Day Marathon (Locked)">
                        <i data-lucide="infinity" class="w-8 h-8 text-slate-500"></i>
                    </div>
                </div>
            </div>

            <!-- Long Term Goals -->
            <div class="glass-card p-8 rounded-[2.5rem]">
                <h3 class="text-xl font-bold mb-6">Mission Objectives 🎯</h3>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="goalInput" placeholder="Add a new life goal..." 
                           class="flex-1 bg-slate-900 border border-white/5 rounded-xl px-4 py-3 outline-none input-pill text-sm transition-all">
                    <button onclick="addGoal()" class="bg-sky-500 hover:bg-sky-400 text-slate-950 p-3 rounded-xl transition-all">
                        <i data-lucide="plus" class="w-5 h-5"></i>
                    </button>
                </div>
                <ul id="goalList" class="space-y-3">
                    <!-- Goals injected here -->
                </ul>
            </div>
        </div>

    </main>

    <script>
        lucide.createIcons();

        // Load Fake Stats
        document.getElementById('total-hours').innerText = (Math.random() * 50 + 80).toFixed(1) + " hrs";
        document.getElementById('avg-focus').innerText = Math.floor(Math.random() * 10) + 85 + "%";
        document.getElementById('streak-val').innerText = Math.floor(Math.random() * 5) + 8 + " Days";

        let goals = JSON.parse(localStorage.getItem("eduFocus_profile_goals")) || [
            "Score 95%+ in Finals",
            "Maintain a 10-day focus streak",
            "Perfect posture for a whole week"
        ];

        function saveGoals() {
            localStorage.setItem("eduFocus_profile_goals", JSON.stringify(goals));
        }

        function renderGoals() {
            const list = document.getElementById("goalList");
            list.innerHTML = "";

            goals.forEach((goal, index) => {
                const li = document.createElement("li");
                li.className = "flex items-center justify-between p-4 bg-slate-900/40 rounded-2xl border border-white/5 group hover:border-sky-500/30 transition-all";
                li.innerHTML = `
                    <span class="text-sm text-slate-300">${goal}</span>
                    <button onclick="deleteGoal(${index})" class="text-slate-600 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all">
                        <i data-lucide="x-circle" class="w-4 h-4"></i>
                    </button>
                `;
                list.appendChild(li);
            });
            lucide.createIcons();
        }

        function addGoal() {
            const input = document.getElementById("goalInput");
            if (input.value.trim() === "") return;
            
            goals.push(input.value.trim());
            input.value = "";
            saveGoals();
            renderGoals();

            gsap.from("#goalList li:last-child", { x: -20, opacity: 0, duration: 0.4 });
        }

        function deleteGoal(index) {
            goals.splice(index, 1);
            saveGoals();
            renderGoals();
        }

        window.onload = () => {
            renderGoals();
            
            // GSAP Intro
            gsap.from(".glass-card", {
                y: 30,
                opacity: 0,
                stagger: 0.1,
                duration: 0.8,
                ease: "power3.out"
            });
            
            gsap.from(".profile-gradient", {
                scale: 0.5,
                opacity: 0,
                duration: 1,
                ease: "back.out(1.7)"
            });
        };
    </script>
</body>
</html>
